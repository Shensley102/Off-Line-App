<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AA95 Control Panel</title>
  <link rel="stylesheet" href="./aa95/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="panelShell">
      <div id="panel-container" class="panelContainer" aria-label="AA95 panel"></div>

      <!-- Optional debug readout (you can delete this block if you want) -->
      <div class="readout" id="readoutBox">
        <div><strong>Tip:</strong> Drag knobs to rotate. Click switches to toggle. Drag selector to snap positions.</div>
        <div class="hint">This is a vector rebuild based on your AA95 photo reference.</div>
      </div>
    </div>
  </div>

  <script type="module" src="./aa95/index.js"></script>
</body>
</html>

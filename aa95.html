<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>AA95 Control Panel</title>

  <!-- Mobile / PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#111111"/>
  <link rel="manifest" href="/manifest.json"/>

  <!-- Styles -->
  <link rel="stylesheet" href="/aa95/styles.css"/>

  <style>
    body{
      margin:0;
      background:#0b0c10;
      font-family:system-ui, Arial;
      color:white;
      text-align:center;
    }

    .panel-wrap{
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    .status{
      margin-top:14px;
      padding:12px;
      background:#10151c;
      border:1px solid #1f2a38;
      border-radius:10px;
      text-align:left;
      font-size:14px;
    }

    .home-link{
      display:inline-block;
      margin:14px;
      color:#4cc2ff;
      text-decoration:none;
      font-size:14px;
    }

  </style>
</head>

<body>

<a href="/" class="home-link">← HOME</a>

<div class="panel-wrap">

  <!-- PANEL SVG -->
  <object
    id="aa95Panel"
    type="image/svg+xml"
    data="/aa95/aa95-panel.svg"
    width="100%"
  ></object>

  <!-- STATUS BOX -->
  <div class="status" id="panelStatus">
    Loading panel…
  </div>

</div>

<!-- MAIN MODULE -->
<script type="module" src="/aa95/index.js"></script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/sw.js")
      .then(() => console.log("SW registered"))
      .catch(console.error);
  });
}
</script>

</body>
</html>

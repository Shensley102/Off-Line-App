<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AA95 High-Fidelity Simulator</title>
  <style>
    :root {
      --panel-black: #0c0c0c;
      --label-white: #d0d0d0;
      --boundary-line: rgba(255, 255, 255, 0.2);
      --snap-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { box-sizing: border-box; user-select: none; }

    body {
      background: #050505;
      color: var(--label-white);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    /* THE MAIN PANEL */
    .panel {
      position: relative;
      width: 960px;
      height: 340px;
      background: linear-gradient(180deg, #222 0%, #151515 15%, #0c0c0c 100%);
      border-radius: 12px;
      border: 4px solid #000;
      box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.05);
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(6, 1fr);
    }

    /* BOUNDARY LINES (Silk-screened Boxes) */
    .boundary {
      position: absolute;
      border: 1px solid var(--boundary-line);
      pointer-events: none;
    }
    .box-comms { width: 340px; height: 120px; left: 85px; top: 35px; border-radius: 4px; }
    .box-ics { width: 330px; height: 110px; right: 50px; bottom: 40px; border-radius: 4px; }

    /* COMPONENT WRAPPERS */
    .component {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      color: #bbb;
    }

    /* TOGGLE SWITCHES - 180 DEGREE DOWN LOGIC */
    .toggle { cursor: pointer; }
    .toggle-base {
      width: 28px;
      height: 65px;
      position: relative;
      perspective: 800px;
    }
    .nut {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 10px;
      background: #333;
      border: 1px solid #111;
      border-radius: 2px;
      z-index: 5;
    }
    .lever {
      position: absolute;
      bottom: 16px; /* Lower Axis Pivot Point */
      left: 50%;
      width: 12px;
      height: 44px;
      margin-left: -6px;
      background: linear-gradient(to right, #777, #eee 50%, #777);
      border-radius: 6px 6px 3px 3px;
      transform-origin: bottom center; 
      transition: transform 0.25s var(--snap-curve), filter 0.2s ease;
      z-index: 4;
    }
    
    /* 180 Degree Down Transition */
    [data-active="true"] .lever { transform: rotate(0deg); filter: brightness(1.1); }
    [data-active="false"] .lever { 
      transform: rotate(180deg) translateY(-4px); 
      filter: brightness(0.6); 
    }

    .toggle.red .lever { background: linear-gradient(to right, #922, #f44 50%, #922); }
    .toggle.orange .lever { background: linear-gradient(to right, #a62, #f94 50%, #a62); }

    /* SELECTOR KNOB (Chicken Head) */
    .selector-container {
      width: 120px;
      height: 120px;
      position: relative;
    }
    .selector-base {
      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle, #222, #0a0a0a);
      border: 4px solid #000;
    }
    .chicken-head {
      position: absolute;
      width: 44px;
      height: 70px;
      top: 10px;
      left: 50%;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-130deg);
      background: #222;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      transition: transform 0.2s var(--snap-curve);
      z-index: 10;
    }
    .chicken-head::after {
      content: ''; position: absolute; top: 0; left: 50%;
      width: 4px; height: 40%; background: #fff; transform: translateX(-50%);
    }

    /* VOLUME KNOBS (Ribbed/Knurled Aluminum) */
    .knob-ribbed {
      width: 52px; height: 52px; border-radius: 50%;
      background: repeating-conic-gradient(from 0deg, #111 0deg 5deg, #252525 5deg 10deg);
      border: 2px solid #000; position: relative; cursor: ns-resize;
    }
    .knob-cap {
      position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
      background: radial-gradient(circle, #333, #151515); border-radius: 50%; z-index: 2;
    }
    .knob-indicator {
      position: absolute; width: 3px; height: 18px; background: #fff;
      top: 6px; left: 50%; transform: translateX(-50%);
      z-index: 3; transform-origin: center 20px;
    }

    /* RECESSED BUTTONS */
    .btn-recessed {
      width: 38px; height: 38px; border-radius: 50%; background: #222; border: 3px solid #000;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 3px 6px rgba(0,0,0,0.5);
      cursor: pointer;
    }

    /* GRID POSITIONING */
    .pos-com1 { grid-column: 2; grid-row: 2; }
    .pos-com2 { grid-column: 3; grid-row: 2; }
    .pos-fm1 { grid-column: 4; grid-row: 2; }
    .pos-fm2 { grid-column: 5; grid-row: 2; }
    .pos-aux { grid-column: 6; grid-row: 2; }
    .pos-selector { grid-column: 7 / 9; grid-row: 2 / 5; }
    .pos-rxvol { grid-column: 10; grid-row: 2; }
    .pos-vox { grid-column: 11; grid-row: 2; }
    .pos-adf { grid-column: 10; grid-row: 3; }
    .pos-dplr { grid-column: 10; grid-row: 4; }
    .pos-so { grid-column: 10; grid-row: 5; }
    .pos-iso { grid-column: 1; grid-row: 5; }
    .pos-mic { grid-column: 8; grid-row: 5; }
    .pos-key { grid-column: 9; grid-row: 5; }
    .pos-icsvol { grid-column: 11; grid-row: 5; }

    .display {
      background: #000; color: #0f4; font-family: monospace;
      padding: 10px 20px; border: 1px solid #333; margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="boundary box-comms"></div>
    <div class="boundary box-ics"></div>

    <div class="component pos-com1 toggle" id="com1" data-active="true">
      <span class="label">COM 1</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>
    <div class="component pos-com2 toggle" id="com2" data-active="true">
      <span class="label">COM 2</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>
    <div class="component pos-fm1 toggle" id="fm1" data-active="true">
      <span class="label">FM 1</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>
    <div class="component pos-fm2 toggle" id="fm2" data-active="true">
      <span class="label">FM 2</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>
    <div class="component pos-aux toggle" id="aux" data-active="true">
      <span class="label">AUX</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>

    <div class="component pos-selector">
      <div class="selector-container">
        <div class="selector-base"></div>
        <div class="chicken-head" id="sel-ptr"></div>
      </div>
      <span class="label" style="margin-top:15px">SELECTOR</span>
    </div>

    <div class="component pos-rxvol">
      <span class="label">RX VOL</span>
      <div class="knob-ribbed" id="rxvol"><div class="knob-cap"></div><div class="knob-indicator"></div></div>
    </div>
    <div class="component pos-vox">
      <span class="label">VOX</span>
      <div class="knob-ribbed" id="vox"><div class="knob-cap"></div><div class="knob-indicator"></div></div>
    </div>
    <div class="component pos-adf"><span class="label">ADF</span><div class="btn-recessed"></div></div>
    <div class="component pos-dplr"><span class="label">DPLR</span><div class="btn-recessed"></div></div>
    <div class="component pos-so"><span class="label">SO</span><div class="btn-recessed"></div></div>

    <div class="component pos-iso toggle red" id="iso" data-active="true">
      <span class="label">ISO/EMR</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>
    <div class="component pos-mic toggle orange" id="mic" data-active="true">
      <span class="label">ICS MIC</span>
      <div class="toggle-base"><div class="nut"></div><div class="lever"></div></div>
    </div>
    <div class="component pos-key"><span class="label">ICS KEY</span><div class="btn-recessed"></div></div>
    <div class="component pos-icsvol">
      <span class="label">ICS VOL</span>
      <div class="knob-ribbed" id="icsvol"><div class="knob-cap"></div><div class="knob-indicator"></div></div>
    </div>
  </div>

  <div class="display" id="display">AA95 SYSTEMS NOMINAL - ALL TOGGLES ON</div>

  <script>
    const display = document.getElementById('display');

    // Toggle Interaction Logic
    document.querySelectorAll('.toggle').forEach(el => {
      el.onclick = () => {
        const isActive = el.getAttribute('data-active') === 'true';
        el.setAttribute('data-active', !isActive);
        display.innerText = `${el.id.toUpperCase()}: ${!isActive ? 'ON (UP)' : 'OFF (DOWN)'}`;
      };
    });

    // Selector Knob Snap
    const selPtr = document.getElementById('sel-ptr');
    const angles = [-130, -90, -45, 0, 45, 90, 130];
    let curIdx = 3; // Start at center
    document.querySelector('.selector-container').onclick = () => {
      curIdx = (curIdx + 1) % angles.length;
      selPtr.style.transform = `translateX(-50%) rotate(${angles[curIdx]}deg)`;
    };

    // Volume Knob Logic
    const initKnob = (id) => {
      const knob = document.getElementById(id);
      const ind = knob.querySelector('.knob-indicator');
      let val = 50;
      const redraw = () => ind.style.transform = `translateX(-50%) rotate(${(val/100)*300 - 150}deg)`;
      knob.onwheel = (e) => { e.preventDefault(); val = Math.max(0, Math.min(100, val + (e.deltaY < 0 ? 5 : -5))); redraw(); };
      redraw();
    };
    ['rxvol', 'vox', 'icsvol'].forEach(initKnob);
  </script>
</body>
</html>

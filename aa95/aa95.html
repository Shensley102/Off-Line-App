<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AA95 Audio Control Panel</title>
  <link rel="stylesheet" href="/aa95/styles.css">
</head>
<body>
  <div class="panel-wrapper">
    <div class="panel" id="panel">
      <!-- Base panel photo - THIS IS THE ONLY VISIBLE ELEMENT -->
      <img src="/aa95/assests/img_001.webp" alt="AA95 Panel" class="panel-base" draggable="false">
      
      <!-- INVISIBLE HOTSPOTS - positioned exactly over photo elements -->
      
      <!-- Toggle switches (COM1, COM2, FM1, FM2, AUX) - top row white toggles -->
      <div class="hotspot toggle" id="com1" data-label="COM1" data-state="up" style="left: 115px; top: 2px; width: 24px; height: 68px;"></div>
      <div class="hotspot toggle" id="com2" data-label="COM2" data-state="up" style="left: 175px; top: 2px; width: 24px; height: 68px;"></div>
      <div class="hotspot toggle" id="fm1" data-label="FM1" data-state="up" style="left: 238px; top: 2px; width: 24px; height: 68px;"></div>
      <div class="hotspot toggle" id="fm2" data-label="FM2" data-state="up" style="left: 298px; top: 2px; width: 24px; height: 68px;"></div>
      <div class="hotspot toggle" id="aux" data-label="AUX" data-state="up" style="left: 358px; top: 2px; width: 24px; height: 68px;"></div>
      
      <!-- Main selector knob (large gray knob in center) -->
      <div class="hotspot knob selector" id="selector" data-label="SELECTOR" style="left: 395px; top: 100px; width: 135px; height: 135px;"></div>
      
      <!-- MUSIC section - ADF button (blue, left) -->
      <div class="hotspot button" id="adf" data-label="ADF" data-state="off" style="left: 508px; top: 12px; width: 24px; height: 24px;"></div>
      
      <!-- MUSIC section - DPLR button (dark/black, right) -->
      <div class="hotspot button" id="dplr" data-label="DPLR" data-state="off" style="left: 556px; top: 12px; width: 24px; height: 24px;"></div>
      
      <!-- PAT ON toggle (small white toggle) -->
      <div class="hotspot toggle small" id="pat" data-label="PAT" data-state="up" style="left: 630px; top: 5px; width: 20px; height: 45px;"></div>
      
      <!-- SO button (yellow/cream) -->
      <div class="hotspot button" id="so" data-label="SO" data-state="off" style="left: 700px; top: 12px; width: 28px; height: 28px;"></div>
      
      <!-- RX VOL knob (top right, black ribbed with white pointer) -->
      <div class="hotspot knob" id="rxvol" data-label="RX VOL" style="left: 870px; top: 18px; width: 62px; height: 85px;"></div>
      
      <!-- ISO/EMR button (pink/salmon, bottom left) -->
      <div class="hotspot button" id="iso_emr" data-label="ISO/EMR" data-state="normal" style="left: 95px; top: 205px; width: 34px; height: 34px;"></div>
      
      <!-- TX indicator light (green, next to VOX) -->
      <div class="hotspot indicator" id="tx_light" data-label="TX" data-state="on" style="left: 195px; top: 195px; width: 26px; height: 26px;"></div>
      
      <!-- VOX knob (black with white text) -->
      <div class="hotspot knob" id="vox" data-label="VOX" style="left: 250px; top: 180px; width: 52px; height: 52px;"></div>
      
      <!-- ICS CALL button (large white dome) -->
      <div class="hotspot button momentary" id="ics_call" data-label="ICS CALL" style="left: 548px; top: 195px; width: 48px; height: 48px;"></div>
      
      <!-- PLT indicator light (green, right side) -->
      <div class="hotspot indicator" id="plt_light" data-label="PLT" data-state="on" style="left: 658px; top: 155px; width: 26px; height: 26px;"></div>
      
      <!-- ICS MIC toggle (orange/tan lever) -->
      <div class="hotspot toggle" id="ics_mic" data-label="ICS MIC" data-state="up" style="left: 718px; top: 185px; width: 28px; height: 50px;"></div>
      
      <!-- KEY toggle (small, bottom right area) -->
      <div class="hotspot toggle small" id="key" data-label="KEY" data-state="up" style="left: 768px; top: 228px; width: 18px; height: 40px;"></div>
      
      <!-- ICS VOL knob (bottom right, black ribbed with white pointer) -->
      <div class="hotspot knob" id="icsvol" data-label="ICS VOL" style="left: 870px; top: 175px; width: 62px; height: 85px;"></div>
    </div>
    
    <!-- Status display for training feedback -->
    <div class="status-bar" id="statusBar">
      <span id="statusText">AA95 Panel Ready - Click controls to interact</span>
    </div>
  </div>
  
  <script src="/aa95/panel.js"></script>
</body>
</html>

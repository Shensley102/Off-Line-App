<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>AA95 Audio Control Panel - Final Alignment</title>
  <style>
    :root {
      --panel-black: #121212;
      --label-white: #e8e8e8;
      --boundary-line: rgba(255, 255, 255, 0.25);
      --snap-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
      --accent-green: #0f4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      color: var(--label-white);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .panel {
      position: relative;
      width: 940px;
      height: 314px;
      background: linear-gradient(180deg, #222 0%, #151515 20%, #111 100%);
      border: 3px solid #000;
      border-radius: 10px;
      box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px #000;
      user-select: none;
    }

    /* BACKGROUND RX-ON LAYER (Sits behind levers) */
    .rx-on-header {
      position: absolute;
      left: 143px;
      top: 62px; /* Positioned to be obscured by lever in UP position */
      width: 292px;
      height: 20px;
      display: flex;
      justify-content: center;
      z-index: 1; 
      pointer-events: none;
    }
    
    .rx-on-line {
      position: absolute;
      top: 8px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--boundary-line);
    }
    
    .rx-on-text {
      position: relative;
      font-size: 11px;
      font-weight: 900;
      color: var(--label-white);
      background: #181818; /* Masks line behind text */
      padding: 0 6px;
      top: -2px;
    }
    
    .rx-on-drops {
      position: absolute;
      left: 143px;
      top: 70px;
      width: 292px;
      height: 65px;
      z-index: 1;
      pointer-events: none;
    }
    
    .rx-drop-line {
      position: absolute;
      top: 0;
      width: 1px;
      height: 100%;
      background: var(--boundary-line);
    }
    /* EXACT CENTERS: (Start 22px + 73px spacing) */
    .rx-drop-line:nth-child(1) { left: 22px; }
    .rx-drop-line:nth-child(2) { left: 95px; }
    .rx-drop-line:nth-child(3) { left: 168px; }
    .rx-drop-line:nth-child(4) { left: 241px; }
    .rx-drop-line:nth-child(5) { left: 314px; }

    /* SVG LEADER LINES */
    .panel-svg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .leader-line { stroke: rgba(232, 232, 232, 0.3); stroke-width: 1.2; fill: none; }

    .component {

      display: flex;

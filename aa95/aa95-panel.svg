<?xml version="1.0" encoding="UTF-8"?>
<svg id="aa95_svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" role="img" aria-label="AA95 audio panel">
  <defs>
    <linearGradient id="panelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1f27"/>
      <stop offset="0.55" stop-color="#0f131a"/>
      <stop offset="1" stop-color="#141924"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="inset" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <style>
      .label { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#e7c96a; font-weight:600; letter-spacing:0.5px;}
      .labelSmall { font-size:14px; }
      .labelMed { font-size:16px; }
      .labelBig { font-size:22px; }
      .engrave { fill:#cfd6e1; font-family: ui-serif, Georgia, "Times New Roman", Times; letter-spacing:2px; }
      .dim { opacity:0.65; }
      .bezel { fill:#151a22; stroke:#2a3140; stroke-width:2; }
      .bezelRing { fill:#0b0e14; stroke:#2d3647; stroke-width:2; }
      .screw { fill:#0b0e14; stroke:#353f52; stroke-width:2; }
      .screwSlot { stroke:#3f4a60; stroke-width:4; stroke-linecap:round; opacity:0.75; }
      .wire { stroke:#e7c96a; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:0.9; }
      .hot { fill:#fff; opacity:0.001; cursor:pointer; }
      .onGlow { fill:#f6f0d3; opacity:0; }
      .leverUp { opacity:1; }
      .leverDown { opacity:0; }
    </style>
  </defs>

  <!-- Panel -->
  <rect x="20" y="20" width="960" height="220" rx="18" fill="url(#panelGrad)" stroke="#2a3140" stroke-width="3" filter="url(#softShadow)"/>
  <rect x="26" y="26" width="948" height="208" rx="14" fill="url(#vignette)" opacity="0.75"/>

  <!-- Screws -->
  <g filter="url(#inset)">
    <g transform="translate(52,44)">
      <circle r="16" class="screw"/><line x1="-8" y1="-6" x2="8" y2="6" class="screwSlot"/><line x1="-8" y1="6" x2="8" y2="-6" class="screwSlot"/>
    </g>
    <g transform="translate(948,44)">
      <circle r="16" class="screw"/><line x1="-8" y1="-6" x2="8" y2="6" class="screwSlot"/><line x1="-8" y1="6" x2="8" y2="-6" class="screwSlot"/>
    </g>
    <g transform="translate(52,216)">
      <circle r="16" class="screw"/><line x1="-8" y1="-6" x2="8" y2="6" class="screwSlot"/><line x1="-8" y1="6" x2="8" y2="-6" class="screwSlot"/>
    </g>
    <g transform="translate(948,216)">
      <circle r="16" class="screw"/><line x1="-8" y1="-6" x2="8" y2="6" class="screwSlot"/><line x1="-8" y1="6" x2="8" y2="-6" class="screwSlot"/>
    </g>
  </g>

  <!-- Title / model -->
  <text x="120" y="70" class="engrave" font-size="28">AA95</text>
  <text x="120" y="92" class="engrave dim" font-size="18">AUDIO PANEL</text>
  <text x="70" y="140" class="label labelMed">AA95</text>
  <text x="70" y="162" class="label labelMed">-729</text>

  <!-- Top row toggle switches -->
  <g id="top_toggles" transform="translate(150,54)">
    <g id="com1_toggle" transform="translate(0,0)">
      <rect x="-28" y="0" width="56" height="74" rx="10" class="bezel"/>
      <rect id="com1_toggle_bgDown" x="-28" y="0" width="56" height="74" rx="10" class="onGlow"/>
      <g id="com1_toggle_leverUp" class="leverUp">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="-10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <g id="com1_toggle_leverDown" class="leverDown">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <rect class="hot" x="-28" y="0" width="56" height="74"/>
      <text x="0" y="98" text-anchor="middle" class="label labelSmall">COM</text>
      <text x="0" y="116" text-anchor="middle" class="label labelSmall">1</text>
    </g>

    <g id="com2_toggle" transform="translate(92,0)">
      <rect x="-28" y="0" width="56" height="74" rx="10" class="bezel"/>
      <rect id="com2_toggle_bgDown" x="-28" y="0" width="56" height="74" rx="10" class="onGlow"/>
      <g id="com2_toggle_leverUp" class="leverUp">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="-10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <g id="com2_toggle_leverDown" class="leverDown">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <rect class="hot" x="-28" y="0" width="56" height="74"/>
      <text x="0" y="98" text-anchor="middle" class="label labelSmall">COM</text>
      <text x="0" y="116" text-anchor="middle" class="label labelSmall">2</text>
    </g>

    <g id="fm1_toggle" transform="translate(184,0)">
      <rect x="-28" y="0" width="56" height="74" rx="10" class="bezel"/>
      <rect id="fm1_toggle_bgDown" x="-28" y="0" width="56" height="74" rx="10" class="onGlow"/>
      <g id="fm1_toggle_leverUp" class="leverUp">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="-10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <g id="fm1_toggle_leverDown" class="leverDown">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <rect class="hot" x="-28" y="0" width="56" height="74"/>
      <text x="0" y="98" text-anchor="middle" class="label labelSmall">FM1</text>
    </g>

    <g id="fm2_toggle" transform="translate(276,0)">
      <rect x="-28" y="0" width="56" height="74" rx="10" class="bezel"/>
      <rect id="fm2_toggle_bgDown" x="-28" y="0" width="56" height="74" rx="10" class="onGlow"/>
      <g id="fm2_toggle_leverUp" class="leverUp">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="-10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <g id="fm2_toggle_leverDown" class="leverDown">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <rect class="hot" x="-28" y="0" width="56" height="74"/>
      <text x="0" y="98" text-anchor="middle" class="label labelSmall">FM2</text>
    </g>

    <g id="aux_toggle" transform="translate(368,0)">
      <rect x="-28" y="0" width="56" height="74" rx="10" class="bezel"/>
      <rect id="aux_toggle_bgDown" x="-28" y="0" width="56" height="74" rx="10" class="onGlow"/>
      <g id="aux_toggle_leverUp" class="leverUp">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="-10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <g id="aux_toggle_leverDown" class="leverDown">
        <circle cx="0" cy="18" r="12" fill="#0b0e14" stroke="#3a4358" stroke-width="2"/>
        <rect x="-7" y="10" width="14" height="42" rx="7" fill="#e9edf5" stroke="#b9c0cf" stroke-width="2"/>
      </g>
      <rect class="hot" x="-28" y="0" width="56" height="74"/>
      <text x="0" y="98" text-anchor="middle" class="label labelSmall">AUX</text>
    </g>
  </g>

  <!-- Wiring lines from toggles to selector -->
  <path class="wire" d="M150 134 C240 134, 310 134, 430 134"/>
  <path class="wire" d="M242 134 C315 148, 360 150, 430 150"/>
  <path class="wire" d="M334 134 C360 164, 390 166, 430 166"/>
  <path class="wire" d="M426 134 C408 180, 410 184, 430 184"/>
  <path class="wire" d="M518 134 C472 198, 452 202, 430 202"/>

  <!-- MUSIC knobs + labels -->
  <text x="640" y="78" class="label labelMed">MUSIC</text>
  <g id="music_knobs" transform="translate(654,92)">
    <g id="adf_toggle" transform="translate(-40,0)">
      <circle r="16" fill="#142033" stroke="#2f436b" stroke-width="3"/>
      <circle id="adf_toggle_bgDown" r="18" fill="#3a69ff" opacity="0"/>
      <rect class="hot" x="-20" y="-20" width="40" height="40"/>
    </g>
    <g id="dplr_toggle" transform="translate(40,0)">
      <circle r="16" fill="#142033" stroke="#2f436b" stroke-width="3"/>
      <circle id="dplr_toggle_bgDown" r="18" fill="#3a69ff" opacity="0"/>
      <rect class="hot" x="-20" y="-20" width="40" height="40"/>
    </g>
    <text x="-40" y="44" text-anchor="middle" class="label labelSmall">ADF</text>
    <text x="40" y="44" text-anchor="middle" class="label labelSmall">DPLR</text>
  </g>

  <!-- PAT toggle / SO button / ON indicator -->
  <g transform="translate(760,58)">
    <text x="0" y="18" class="label labelMed">PAT</text>
    <text x="0" y="38" class="label labelMed">ON</text>

    <g id="pat_toggle" transform="translate(40,26)">
      <rect x="-10" y="-16" width="20" height="32" rx="6" class="bezel"/>
      <rect id="pat_toggle_bgDown" x="-10" y="-16" width="20" height="32" rx="6" fill="#f2d16e" opacity="0"/>
      <circle cx="0" cy="-6" r="6" fill="#121722" stroke="#2a3140" stroke-width="2"/>
      <circle cx="0" cy="6" r="6" fill="#121722" stroke="#2a3140" stroke-width="2"/>
      <rect id="pat_toggle_leverUp" x="-4" y="-12" width="8" height="14" rx="4" fill="#2a3140" opacity="1"/>
      <rect id="pat_toggle_leverDown" x="-4" y="-2" width="8" height="14" rx="4" fill="#2a3140" opacity="0"/>
      <rect class="hot" x="-12" y="-18" width="24" height="36"/>
    </g>

    <text x="92" y="18" class="label labelMed">ON</text>
    <g id="so_toggle" transform="translate(98,34)">
      <circle r="10" fill="#e8d06e" stroke="#c1a94a" stroke-width="3"/>
      <rect class="hot" x="-14" y="-14" width="28" height="28"/>
    </g>
    <text x="86" y="62" class="label labelMed">SO</text>
  </g>

  <!-- RX VOL big knob -->
  <g id="rx_vol_knob" transform="translate(930,90)">
    <text x="0" y="-40" class="label labelMed" text-anchor="middle">RX VOL</text>
    <circle r="42" class="bezelRing" filter="url(#inset)"/>
    <circle r="32" fill="#1b2230" stroke="#3b465c" stroke-width="3"/>
    <path id="rx_vol_pointer" d="M0 -28 L0 -40" stroke="#d6dbe6" stroke-width="6" stroke-linecap="round"/>
    <rect class="hot" x="-48" y="-48" width="96" height="96"/>
  </g>

  <!-- ISO/EMR switch + TX light + VOX knob -->
  <g transform="translate(160,170)">
    <text x="-70" y="-8" class="label labelMed">ISO/EMR</text>
    <g id="iso_emr">
      <circle cx="-10" cy="22" r="18" class="bezelRing"/>
      <circle id="iso_emr_toggle_bgDown" cx="-10" cy="22" r="20" fill="#ff7d7d" opacity="0"/>
      <circle cx="-10" cy="22" r="10" fill="#f2b7b7" stroke="#c68e8e" stroke-width="3"/>
      <rect class="hot" x="-34" y="-2" width="48" height="48"/>
    </g>
    <text id="iso_emr_text" x="-10" y="64" text-anchor="middle" class="label labelSmall">ISO</text>

    <text x="60" y="10" class="label labelMed">TX</text>
    <g id="tx_light" transform="translate(66,28)">
      <circle r="16" fill="#0b0e14" stroke="#2a3140" stroke-width="3"/>
      <circle id="tx_light_on" r="11" fill="#2fd66a" opacity="0.8"/>
    </g>

    <text x="140" y="58" class="label labelMed">LIVE</text>
    <g id="vox_knob" transform="translate(140,22)">
      <circle r="28" class="bezelRing"/>
      <circle r="20" fill="#d9dde6" stroke="#b4bac9" stroke-width="3"/>
      <path id="vox_pointer" d="M0 -16 L0 -24" stroke="#2a3140" stroke-width="5" stroke-linecap="round"/>
      <text x="0" y="6" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#2a3140">VOX</text>
      <rect class="hot" x="-32" y="-32" width="64" height="64"/>
    </g>
  </g>

  <!-- Main selector knob -->
  <g id="selector_group" transform="translate(520,168)">
    <text x="0" y="86" class="label labelMed" text-anchor="middle">COM1</text>
    <text x="92" y="56" class="label labelSmall">COM2</text>
    <text x="112" y="20" class="label labelSmall">FM1</text>
    <text x="102" y="-18" class="label labelSmall">FM2</text>
    <text x="72" y="-46" class="label labelSmall">AUX</text>
    <text x="46" y="78" class="label labelSmall">PA</text>

    <g stroke="#e7c96a" stroke-width="3" opacity="0.9">
      <line x1="0" y1="-70" x2="0" y2="-58"/>
      <line x1="50" y1="-55" x2="42" y2="-45"/>
      <line x1="70" y1="-15" x2="58" y2="-12"/>
      <line x1="66" y1="28" x2="54" y2="22"/>
      <line x1="34" y1="62" x2="26" y2="52"/>
      <line x1="-8" y1="72" x2="-6" y2="60"/>
    </g>

    <g id="selector_knob">
      <circle r="62" class="bezelRing" filter="url(#inset)"/>
      <circle r="46" fill="#1b2230" stroke="#3b465c" stroke-width="3"/>
      <path id="selector_pointer" d="M0 -40 L0 -58" stroke="#e7f6f3" stroke-width="8" stroke-linecap="round"/>
      <circle r="6" fill="#7ce9d5"/>
      <rect class="hot" x="-70" y="-70" width="140" height="140"/>
    </g>
    <text id="selector_text" x="0" y="8" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-weight="700" font-size="14" fill="#cfd6e1">COM1</text>
  </g>

  <!-- ICS CALL button -->
  <g id="ics_call" transform="translate(700,176)">
    <text x="0" y="-30" class="label labelMed" text-anchor="middle">ICS</text>
    <text x="0" y="-10" class="label labelMed" text-anchor="middle">CALL</text>
    <circle r="30" fill="#e8e8ee" stroke="#b9bcc7" stroke-width="4" filter="url(#inset)"/>
    <rect class="hot" x="-34" y="-34" width="68" height="68"/>
  </g>

  <!-- PLT light + ICS MIC toggle + KEY -->
  <g transform="translate(780,170)">
    <text x="-10" y="-60" class="label labelMed">PLT</text>
    <g id="plt_light" transform="translate(6,-40)">
      <circle r="18" fill="#0b0e14" stroke="#2a3140" stroke-width="3"/>
      <circle id="plt_light_on" r="12" fill="#2fd66a" opacity="0.8"/>
    </g>

    <text x="0" y="-10" class="label labelMed">ICS</text>
    <text x="-6" y="10" class="label labelMed">MIC</text>
    <g id="ics_mic_toggle" transform="translate(50,4)">
      <circle r="16" class="bezelRing"/>
      <rect id="ics_mic_toggle_bgDown" x="-18" y="-18" width="36" height="36" rx="10" fill="#f6f0d3" opacity="0"/>
      <rect x="-5" y="-18" width="10" height="36" rx="5" fill="#d39a3a" stroke="#b07722" stroke-width="2"/>
      <rect class="hot" x="-20" y="-20" width="40" height="40"/>
    </g>

    <text x="0" y="64" class="label labelMed">KEY</text>
    <g id="key_toggle" transform="translate(48,54)">
      <rect x="-10" y="-16" width="20" height="32" rx="6" class="bezel"/>
      <rect id="key_toggle_bgDown" x="-10" y="-16" width="20" height="32" rx="6" fill="#f6f0d3" opacity="0"/>
      <rect x="-5" y="-12" width="10" height="24" rx="5" fill="#cbd2dd" stroke="#9aa3b5" stroke-width="2"/>
      <rect class="hot" x="-12" y="-18" width="24" height="36"/>
    </g>
  </g>

  <!-- ICS VOL knob -->
  <g id="ics_vol_knob" transform="translate(920,186)">
    <text x="0" y="-44" class="label labelMed" text-anchor="middle">ICS VOL</text>
    <circle r="42" class="bezelRing" filter="url(#inset)"/>
    <circle r="32" fill="#1b2230" stroke="#3b465c" stroke-width="3"/>
    <path id="ics_vol_pointer" d="M0 -28 L0 -40" stroke="#d6dbe6" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="8" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#cfd6e1">ICS</text>
    <rect class="hot" x="-48" y="-48" width="96" height="96"/>
  </g>

  <!-- Readout -->
  <g id="readout" transform="translate(350,232)" opacity="0.75">
    <text class="label labelSmall">SEL:</text>
    <text id="readout_selector" x="40" class="label labelSmall">COM1</text>
    <text x="160" class="label labelSmall">ISO:</text>
    <text id="readout_iso" x="205" class="label labelSmall">ISO</text>
  </g>
</svg>
